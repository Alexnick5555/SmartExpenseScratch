<header class="main-header" id="header">
    <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>

    <div class="header-right">
        <div class="header-date">
            <i class="bi bi-calendar3"></i>
            <span id="currentDate"></span>
        </div>

        <div class="dropdown user-dropdown">
            <button class="user-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <div class="user-avatar">
                    {% if request.user.get_full_name %}
                        {{ request.user.get_full_name|slice:":1" }}
                    {% else %}
                        {{ request.user.username|slice:":1"|upper }}
                    {% endif %}
                </div>
                <span class="user-name d-none d-md-inline">{{ request.user.get_full_name|default:request.user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Profile</a></li>
                <li><a class="dropdown-item" href="{% url 'settings' %}"><i class="bi bi-gear me-2"></i>Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>
</header>
