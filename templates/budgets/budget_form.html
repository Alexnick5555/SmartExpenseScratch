{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }} - SmartExpense{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block extra_css %}
<style>
    .content-area { padding: 2rem; max-width: 500px; margin: 0 auto; }
    .page-card { 
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px; 
        padding: 2rem; 
    }
    .page-title { color: white !important; }
    .form-label {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
    }
    .form-control, .form-select {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        border-radius: 10px;
        padding: 0.75rem;
    }
    .form-control:focus, .form-select:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: #6366F1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        color: white;
    }
    .form-select option {
        background: #1E293B;
        color: white;
    }
    
    /* Light theme overrides */
    body.light-theme .page-card {
        background: white !important;
        border-color: rgba(0, 0, 0, 0.08) !important;
    }
    body.light-theme .page-title {
        color: #1E293B !important;
    }
    body.light-theme .form-label {
        color: #374151 !important;
    }
    body.light-theme .form-control, 
    body.light-theme .form-select {
        background: #F8FAFC !important;
        border-color: #E2E8F0 !important;
        color: #1E293B !important;
    }
    body.light-theme .form-control:focus, 
    body.light-theme .form-select:focus {
        background: white !important;
        border-color: #6366F1 !important;
    }
    body.light-theme .form-select option {
        background: white !important;
        color: #1E293B !important;
    }
    @media (max-width: 991px) { .main-content { margin-left: 0; } }
</style>
{% endblock %}

{% block content %}
<main class="main-content">
    <div class="content-area">
        <div class="page-card">
            <h2 class="page-title mb-4"><i class="bi bi-pie-chart me-2"></i>{{ title }}</h2>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    {{ form.category }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Budget Amount (₹)</label>
                    {{ form.amount }}
                </div>
                <div class="row mb-4">
                    <div class="col-6">
                        <label class="form-label">Month</label>
                        <input type="number" name="month" class="form-control" value="{{ month }}" min="1" max="12">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Year</label>
                        <input type="number" name="year" class="form-control" value="{{ year }}" min="2020">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Save Budget</button>
                    <a href="{% url 'budget_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
